services:
  db:
    image: postgres:16-alpine
    container_name: escuelitas_fut_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: escuelitas_fut
    ports:
      - "5432:5432"
    volumes:
      - escuelitas_pgdata:/var/lib/postgresql/data

volumes:
  escuelitas_pgdata:
